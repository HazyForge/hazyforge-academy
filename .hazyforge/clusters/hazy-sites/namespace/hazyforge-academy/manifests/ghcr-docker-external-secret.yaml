apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ghcr-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azurekv-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: ghcr-creds
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: '{"auths":{"ghcr.io":{"username":"hazyforge","password":"{{ .pat }}","auth":"{{ printf "%s:%s" "hazyforge" .pat | b64enc }}"}}}'
  data:
    - secretKey: pat
      remoteRef:
        key: secret/anvil-primaris-ghcr-read-pat
