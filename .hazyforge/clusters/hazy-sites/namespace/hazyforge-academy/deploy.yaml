# Appset Values
helmChartPath: charts/hazyforge-academy
# Helm Values
image:
  repository: ghcr.io/hazyforge/hazyforge-academy
  pullPolicy: Always
  tag: sha-6bb9b37b6d2241652976b39d80223f7388ee6338
imagePullSecrets:
  - name: ghcr-creds
resources:
  requests:
    cpu: 25m
    memory: 64Mi
  limits:
    cpu: 300m
    memory: 192Mi
service:
  port: 80
  containerPort: 80
livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http
