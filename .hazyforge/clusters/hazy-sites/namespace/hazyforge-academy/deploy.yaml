# Appset Values
helmChartPath: charts/hazyforge-academy
# Helm Values
image:
  repository: ghcr.io/hazyforge/hazyforge-academy
  pullPolicy: Always
  tag: sha-19d4fe6
imagePullSecrets:
  - name: ghcr-creds
resources:
  requests:
    cpu: 25m
    memory: 96Mi
  limits:
    cpu: 300m
    memory: 256Mi
service:
  port: 80
  containerPort: 80
livenessProbe:
  httpGet:
    path: /healthz
    port: http
readinessProbe:
  httpGet:
    path: /healthz
    port: http
